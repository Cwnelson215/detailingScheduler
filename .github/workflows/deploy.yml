name: Deploy to k3s

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/cwnelson215/detailing

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.34.0'

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.4.3'

      - name: Connect to tailnet
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Configure kubectl
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Apply app-secrets
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_REPLY_TO: ${{ secrets.EMAIL_REPLY_TO }}
          BOOKING_NOTIFY_EMAIL: ${{ secrets.BOOKING_NOTIFY_EMAIL }}
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          kubectl create secret generic app-secrets \
            --namespace detailing \
            --from-literal=NEXTAUTH_SECRET="$NEXTAUTH_SECRET" \
            --from-literal=NEXTAUTH_URL="$NEXTAUTH_URL" \
            --from-literal=RESEND_API_KEY="$RESEND_API_KEY" \
            --from-literal=EMAIL_FROM="$EMAIL_FROM" \
            --from-literal=EMAIL_REPLY_TO="$EMAIL_REPLY_TO" \
            --from-literal=BOOKING_NOTIFY_EMAIL="$BOOKING_NOTIFY_EMAIL" \
            --from-literal=SITE_URL="$SITE_URL" \
            --from-literal=CRON_SECRET="$CRON_SECRET" \
            --dry-run=client -o yaml \
            | kubectl apply -f -

      - name: Set image tag in overlay
        working-directory: k8s/overlays/prod
        run: kustomize edit set image "$IMAGE=$IMAGE:$GITHUB_SHA"

      - name: Apply manifests
        run: kubectl apply -k k8s/overlays/prod

      - name: Wait for rollout
        run: kubectl rollout status deployment/detailing -n detailing --timeout=3m
